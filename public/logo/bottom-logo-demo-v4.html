<!doctype html>
<html lang="et">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Bottom logo (shine v4)</title>
  <style>
    :root {
      --shineDur: 11800; /* ms – slower */
      --breatheDur: 6700ms;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(1200px 700px at 20% 20%, rgba(197,113,113,0.14), transparent 60%),
        radial-gradient(900px 600px at 80% 30%, rgba(120,170,255,0.12), transparent 60%),
        linear-gradient(180deg, #070a13, #04050a 70%);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      color: rgba(255,255,255,0.80);
    }

    .hint {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 18px 110px;
      font-size: 13px;
      line-height: 1.45;
      color: rgba(255,255,255,0.60);
    }

    .bottomDock {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: min(900px, 96vw);
      height: 86px;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      overflow: hidden; /* guarantee: nothing below screen */
      pointer-events: none;
    }

    .logo {
      pointer-events: auto;
      width: min(560px, 92vw);
      height: auto;
      max-height: 62px;

      transform-origin: 50% 100%;
      animation: breathe var(--breatheDur) ease-in-out infinite;

      filter: drop-shadow(0 -12px 28px rgba(0,0,0,0.45));
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }

    @media (prefers-reduced-motion: reduce) {
      .logo { animation: none !important; }
    }
  </style>
</head>

  <script>
    (function() {
      const svg = document.getElementById("bottomLogo");
      if (!svg) return;

      const move = svg.getElementById("shineMove__bottom");
      const layer = svg.getElementById("shineLayer__bottom");
      if (!move || !layer) return;

      const dur = Number(getComputedStyle(document.documentElement).getPropertyValue("--shineDur")) || 11800;

      // Move in SVG units (works with viewBox scaling)
      const xFrom = -300;
      const xTo   = 620;

      // Timing: longer rest, slower pass
      const tRestStart = 0.20; // no shine
      const tFadeInEnd = 0.28;
      const tFadeOutStart = 0.72;
      const tEnd = 0.80;

      const opMax = 0.38; // softer overall

      function lerp(a,b,t) { return a + (b-a)*t; }
      function clamp(v,a,b) { return Math.max(a, Math.min(b, v)); }

      // Smoothstep easing for softer in/out (no hard edges)
      function smoothstep(t) {
        t = clamp(t, 0, 1);
        return t * t * (3 - 2*t);
      }

      function opacityAt(p) {
        if (p < tRestStart) return 0;
        if (p < tFadeInEnd) {
          const t = (p - tRestStart) / (tFadeInEnd - tRestStart);
          return opMax * smoothstep(t);
        }
        if (p < tFadeOutStart) return opMax;
        if (p < tEnd) {
          const t = (p - tFadeOutStart) / (tEnd - tFadeOutStart);
          return opMax * (1 - smoothstep(t)) * 0.85; // tail gets very light
        }
        return 0;
      }

      function xAt(p) {
        if (p < tFadeInEnd) return xFrom;
        if (p > tEnd) return xTo;
        const t = (p - tFadeInEnd) / (tEnd - tFadeInEnd);
        return lerp(xFrom, xTo, clamp(t,0,1));
      }

      let start = performance.now() + 900;

      function tick(now) {
        const elapsed = Math.max(0, now - start);
        const p = (elapsed % dur) / dur;

        const op = opacityAt(p);
        const x = xAt(p);

        layer.setAttribute("opacity", op.toFixed(3));
        move.setAttribute("transform", "translate(" + x.toFixed(2) + " 0)");

        requestAnimationFrame(tick);
      }

      requestAnimationFrame(tick);
    })();
  </script>
