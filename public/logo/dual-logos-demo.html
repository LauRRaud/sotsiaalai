<!doctype html>
<html lang="et">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dual Logos Demo (v7)</title>
  <style>
    :root {
      --fg: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.65);
      --border: rgba(255,255,255,0.18);
      --card: rgba(255,255,255,0.08);

      /* Shared timing (same for BOTH logos) */
      --breathe: 6700ms;
      --shine: 9200ms;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--fg);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background:
        radial-gradient(1200px 700px at 20% 20%, rgba(197,113,113,0.18), transparent 60%),
        radial-gradient(900px 600px at 80% 30%, rgba(120,170,255,0.14), transparent 60%),
        linear-gradient(180deg, #070a13, #04050a 70%);
      overflow-x: hidden;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 18px 70px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 18px;
      font-weight: 650;
      letter-spacing: 0.2px;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.45;
      font-size: 13px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    @media (min-width: 900px) {
      .grid { grid-template-columns: 1fr 1fr; }
    }

    .panel {
      border: 1px solid var(--border);
      background: var(--card);
      border-radius: 22px;
      padding: 18px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 24px 60px rgba(0,0,0,0.35);
    }

    .logoBox {
      display: grid;
      place-items: center;
      padding: 22px;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(0,0,0,0.18);
    }

    @media (prefers-reduced-motion: reduce) {
      .logo-breathe, .logo-breathe * { animation: none !important; transition: none !important; }
    }

    /* ===== Breathe + shadow distance (v13 feel, slightly faster) ===== */

    .logo-breathe {
      animation: breathe var(--breathe) ease-in-out infinite;
      transform-origin: 50% 50%;
    }

    @keyframes breathe {
      0%   { transform: translate3d(0,0,0) scale(1); opacity: 0.96; }
      50%  { transform: translate3d(0,-7px,0) scale(1.045); opacity: 1; }
      100% { transform: translate3d(0,0,0) scale(1); opacity: 0.96; }
    }

    .logo-shadow.shadow-hard {
      animation: hardShadow var(--breathe) ease-in-out infinite;
      transform-origin: 50% 50%;
    }

    .logo-shadow.shadow-soft {
      animation: softShadow var(--breathe) ease-in-out infinite;
      transform-origin: 50% 50%;
      opacity: 0.05;
    }

    @keyframes hardShadow {
      0%, 100% { opacity: 0.98; transform: translate3d(0,0,0) scale(1); }
      50%      { opacity: 0.12; transform: translate3d(0,6px,0) scale(1.02); }
    }

    @keyframes softShadow {
      0%, 100% { opacity: 0.10; transform: translate3d(0,1px,0) scale(1.02); }
      50%      { opacity: 0.92; transform: translate3d(0,12px,0) scale(1.14); }
    }

    /* ===== Shine: constant-speed diagonal + very soft fade tail ===== */

    .shine-rect {
      animation: shineMove var(--shine) linear infinite, shineFade var(--shine) ease-in-out infinite;
      will-change: transform, opacity;
      opacity: 0;
    }

    @keyframes shineMove {
      0%   { transform: translate3d(var(--x0), var(--y0), 0) rotate(var(--rot)); }
      70%  { transform: translate3d(var(--x1), var(--y1), 0) rotate(var(--rot)); }
      99%  { transform: translate3d(var(--x1), var(--y1), 0) rotate(var(--rot)); }
      100% { transform: translate3d(var(--x0), var(--y0), 0) rotate(var(--rot)); }
    }

    @keyframes shineFade {
      /* Visible early, then long gentle fade; last ~25–30% is almost transparent */
      0%   { opacity: 0; }
      7%   { opacity: 0.38; }
      32%  { opacity: 0.28; }
      56%  { opacity: 0.14; }
      70%  { opacity: 0.06; }
      78%  { opacity: 0.028; }
      86%  { opacity: 0.012; }
      92%  { opacity: 0.006; }
      96%  { opacity: 0; }
      100% { opacity: 0; }
    }

    /* Sizing */
    .smust svg { width: 150px; height: auto; display: block; }
    .ai svg { width: 190px; height: auto; display: block; }
  </style>
</head>
