<svg xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 24 24"
  opacity="0.8"
>
  <!-- poolik ring – mustjas ja veidi läbipaistev -->
  <g fill="none" stroke="#000000" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.8">
    <path d="M6 7.5A8 8 0 1 1 6 16.5"></path>
  </g>

  <!-- padlock -->
  <g transform="translate(12.7 11.2) scale(0.55) translate(-12 -12)"
     fill="none" stroke="#7A3A38" stroke-width="1.3"
     stroke-linecap="round" stroke-linejoin="round">

    <!-- shackle -->
    <path d="M8.5 11.6V7.8 a1.7 1.7 0 0 1 1.7-1.7h3.6 a1.7 1.7 0 0 1 1.7 1.7V11.6"/>

    <!-- body -->
    <rect x="5" y="11.6" width="14" height="8.8" rx="2"/>

    <!-- keyhole: filled head + thin short stem -->
    <circle cx="12" cy="15.9" r="0.95" fill="#7A3A38" stroke="none"/>
    <path d="M12 16.7V17.55" stroke-width="1.0"/>

  </g>
</svg>
