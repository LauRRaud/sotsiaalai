<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="420" height="420" viewBox="0 0 400 400" fill="none" shape-rendering="auto">
  <defs>
    <!-- NEW (our black sphere body) -->
    <radialGradient id="gBase" cx="56%" cy="42%" r="70%">
      <stop offset="0%"  stop-color="#070707"/>
      <stop offset="45%" stop-color="#020202"/>
      <stop offset="80%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <radialGradient id="gShade" cx="38%" cy="72%" r="70%">
      <stop offset="0%"   stop-color="#000000" stop-opacity="0.00"/>
      <stop offset="72%"  stop-color="#000000" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.12"/>
    </radialGradient>

    <!-- Center glow: moved UP + LEFT (as requested) -->
    <radialGradient id="gGlowSpot" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(155 175) rotate(0) scale(175 140)">
      <stop offset="0"    stop-color="#ffffff" stop-opacity="0.085"/>
      <stop offset="0.42" stop-color="#ffffff" stop-opacity="0.028"/>
      <stop offset="1"    stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- KEEP (your old rim reflection look) -->
    <radialGradient id="gRimStroke" cx="72%" cy="70%" r="78%">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="72%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="92%" stop-color="#e9e9e9" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#f3f3f3" stop-opacity="0.42"/>
    </radialGradient>

    <radialGradient id="gRimStrokeBR" cx="28%" cy="30%" r="78%">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="72%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="92%" stop-color="#f1f1f1" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.28"/>
    </radialGradient>

    <!-- NEW sphere geometry (our new measurements) -->
    <clipPath id="clipSphere">
      <circle cx="200" cy="200" r="188"/>
    </clipPath>


    <!-- KEEP (your old rim reflection masks), scaled to match the new sphere -->
    <linearGradient id="gMaskBottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#000000"/>
      <stop offset="40%"  stop-color="#000000"/>
      <stop offset="70%"  stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>

    <!-- Old top-left allowance, scaled for r=188 -->
    <radialGradient id="gAllowTopLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(118.6 122.3) rotate(0) scale(169 132)">
      <stop offset="0"    stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="1"    stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <mask id="maskBottom" maskUnits="userSpaceOnUse">
      <rect x="0" y="0" width="400" height="400" fill="url(#gMaskBottom)"/>
      <rect x="0" y="0" width="400" height="400" fill="url(#gAllowTopLeft)"/>
    </mask>

    <mask id="maskTopLeftOnly" maskUnits="userSpaceOnUse">
      <rect x="0" y="0" width="400" height="400" fill="#000000"/>
      <rect x="0" y="0" width="400" height="400" fill="url(#gAllowTopLeft)"/>
    </mask>

    <linearGradient id="gMaskLower" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#000000"/>
      <stop offset="58%"  stop-color="#000000"/>
      <stop offset="78%"  stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <mask id="maskLower" maskUnits="userSpaceOnUse">
      <rect x="0" y="0" width="400" height="400" fill="url(#gMaskLower)"/>
    </mask>

    <!-- Old right allowance, scaled for r=188 -->
    <radialGradient id="gAllowRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(331.6 268.9) rotate(-10) scale(169 150)">
      <stop offset="0"    stop-color="#ffffff" stop-opacity="0.70"/>
      <stop offset="0.50" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="1"    stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <mask id="maskRightSpot" maskUnits="userSpaceOnUse">
      <rect x="0" y="0" width="400" height="400" fill="#000000"/>
      <rect x="0" y="0" width="400" height="400" fill="url(#gAllowRight)"/>
    </mask>

    <!-- Filters (expanded regions to avoid clipping artifacts) -->
    <filter id="fGlow" filterUnits="userSpaceOnUse" x="-120" y="-120" width="640" height="640" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="1.45" result="b"/>
      <feMerge><feMergeNode in="b"/></feMerge>
    </filter>

    <filter id="fGlowWide" filterUnits="userSpaceOnUse" x="-140" y="-140" width="680" height="680" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="2.5" result="bw"/>
      <feMerge><feMergeNode in="bw"/></feMerge>
    </filter>

    <filter id="fCrispSoft" filterUnits="userSpaceOnUse" x="-120" y="-120" width="640" height="640" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="1.15" result="cb"/>
      <feMerge><feMergeNode in="cb"/></feMerge>
    </filter>

    <filter id="fNoise" filterUnits="userSpaceOnUse" x="-140" y="-140" width="680" height="680" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.35" numOctaves="2" stitchTiles="noStitch" seed="7" result="n"/>
      <feColorMatrix in="n" type="matrix"
        values="0 0 0 0 0.55
                0 0 0 0 0.55
                0 0 0 0 0.55
                0 0 0 0.12 0" result="ng"/>
      <feGaussianBlur in="ng" stdDeviation="0.55" result="ngb"/>
      <feComposite in="ngb" in2="SourceGraphic" operator="in" result="nout"/>
      <feMerge><feMergeNode in="nout"/></feMerge>
    </filter>
  </defs>

  <g clip-path="url(#clipSphere)">
    <!-- NEW sphere body (kept clean; no edge-stripe gradients) -->
    <circle cx="200" cy="200" r="188" fill="url(#gBase)"/>
    <circle cx="200" cy="200" r="188" fill="url(#gShade)"/>
    <circle cx="200" cy="200" r="188" fill="url(#gGlowSpot)"/>

    <!-- Filtered layers -->
    <g>
      <!-- Noise (optimized: circle, not rect) -->
      <circle cx="200" cy="200" r="188" fill="#000000" filter="url(#fNoise)" opacity="0.07"/>

      <!-- KEEP your rim reflections, scaled to the new sphere size -->
      <g mask="url(#maskBottom)" opacity="0.9">
        <circle cx="200" cy="200" r="184" fill="none"
                stroke="url(#gRimStroke)" stroke-width="15" filter="url(#fGlow)"/>
        <circle cx="200" cy="200" r="184" fill="none"
                stroke="url(#gRimStroke)" stroke-width="4" opacity="0.12"/>
      </g>

      <g mask="url(#maskLower)" opacity="0.48">
        <circle cx="200" cy="200" r="183" fill="none"
                stroke="url(#gRimStroke)" stroke-width="23" filter="url(#fGlowWide)" opacity="0.3"/>
      </g>

      <g mask="url(#maskRightSpot)" opacity="0.86">
        <circle cx="200" cy="200" r="184" fill="none"
                stroke="url(#gRimStrokeBR)" stroke-width="28"
                opacity="0.1" filter="url(#fGlowWide)"/>
        <circle cx="200" cy="200" r="184" fill="none"
                stroke="url(#gRimStrokeBR)" stroke-width="18"
                opacity="0.18" filter="url(#fGlow)"/>
        <circle cx="200" cy="200" r="184" fill="none"
                stroke="url(#gRimStrokeBR)" stroke-width="4" opacity="0.09"/>
      </g>

      <!-- KEEP your softened inner hint near 9–11 -->
      <g mask="url(#maskTopLeftOnly)">
        <circle cx="200" cy="200" r="184" fill="none"
                stroke="#ffffff" stroke-opacity="0.06" stroke-width="4"
                filter="url(#fCrispSoft)"/>
      </g>
    </g>
  </g>
</svg>
