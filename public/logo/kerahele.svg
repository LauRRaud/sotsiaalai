<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" fill="none">
  <defs>
    <!-- BODY: lighter, center bright -->
    <radialGradient id="gBaseLight" cx="44%" cy="34%" r="78%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="38%"  stop-color="#f6f6f6"/>
      <stop offset="70%"  stop-color="#e4e4e4"/>
      <stop offset="100%" stop-color="#d6d6d6"/>
    </radialGradient>

    <radialGradient id="gShadeLight" cx="68%" cy="78%" r="82%">
      <stop offset="0%"   stop-color="#000000" stop-opacity="0.00"/>
      <stop offset="62%"  stop-color="#000000" stop-opacity="0.11"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.18"/>
    </radialGradient>

    <radialGradient id="gHiLight" cx="38%" cy="30%" r="52%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.66"/>
      <stop offset="55%"  stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Rim/shadow gradients (moderate) -->
    <radialGradient id="gRimDark" cx="28%" cy="74%" r="78%">
      <stop offset="0%"   stop-color="#000000" stop-opacity="0"/>
      <stop offset="72%"  stop-color="#000000" stop-opacity="0"/>
      <stop offset="92%"  stop-color="#000000" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.26"/>
    </radialGradient>

    <radialGradient id="gRimDarkBR" cx="28%" cy="74%" r="78%">
      <stop offset="0%"   stop-color="#000000" stop-opacity="0"/>
      <stop offset="72%"  stop-color="#000000" stop-opacity="0"/>
      <stop offset="92%"  stop-color="#000000" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.30"/>
    </radialGradient>

    <radialGradient id="gRimDarkDeep" cx="28%" cy="74%" r="78%">
      <stop offset="0%"   stop-color="#000000" stop-opacity="0"/>
      <stop offset="72%"  stop-color="#000000" stop-opacity="0"/>
      <stop offset="92%"  stop-color="#000000" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.36"/>
    </radialGradient>

    <clipPath id="clipDisk">
      <circle cx="200" cy="200" r="150"/>
    </clipPath>

    <linearGradient id="gMaskBottom" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#000000"/>
      <stop offset="42%"  stop-color="#000000"/>
      <stop offset="72%"  stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>

    <radialGradient id="gAllowTopLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(318 210) rotate(-35) scale(200 165)">
      <stop offset="0"    stop-color="#ffffff" stop-opacity="0.88"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0.52"/>
      <stop offset="1"    stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <mask id="maskBottom" maskUnits="userSpaceOnUse">
      <rect x="0" y="0" width="400" height="400" fill="url(#gMaskBottom)"/>
      <rect x="0" y="0" width="400" height="400" fill="url(#gAllowTopLeft)"/>
    </mask>

    <radialGradient id="gMaskLower" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(310 250) rotate(-38) scale(245 210)">
      <stop offset="0"    stop-color="#ffffff"/>
      <stop offset="0.58" stop-color="#ffffff"/>
      <stop offset="1"    stop-color="#000000"/>
    </radialGradient>
    <mask id="maskLower" maskUnits="userSpaceOnUse">
      <rect x="0" y="0" width="400" height="400" fill="url(#gMaskLower)"/>
    </mask>

    <radialGradient id="gAllowRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(325 265) rotate(-48) scale(185 150)">
      <stop offset="0"    stop-color="#ffffff" stop-opacity="0.82"/>
      <stop offset="0.50" stop-color="#ffffff" stop-opacity="0.34"/>
      <stop offset="1"    stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <mask id="maskRightSpot" maskUnits="userSpaceOnUse">
      <rect x="0" y="0" width="400" height="400" fill="#000000"/>
      <rect x="0" y="0" width="400" height="400" fill="url(#gAllowRight)"/>
    </mask>

    <radialGradient id="gAllowExtra" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(135 305) rotate(6) scale(175 150)">
      <stop offset="0"    stop-color="#ffffff" stop-opacity="0.82"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0.32"/>
      <stop offset="1"    stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <mask id="maskExtraSpot" maskUnits="userSpaceOnUse">
      <rect x="0" y="0" width="400" height="400" fill="#000000"/>
      <rect x="0" y="0" width="400" height="400" fill="url(#gAllowExtra)"/>
    </mask>

    <radialGradient id="gAllowExtraLow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(255 340) rotate(-20) scale(200 155)">
      <stop offset="0"    stop-color="#ffffff" stop-opacity="1.00"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0.62"/>
      <stop offset="1"    stop-color="#000000" stop-opacity="0.00"/>
    </radialGradient>
    <mask id="maskExtraLow" maskUnits="userSpaceOnUse">
      <rect x="0" y="0" width="400" height="400" fill="#000000"/>
      <rect x="0" y="0" width="400" height="400" fill="url(#gAllowExtraLow)"/>
    </mask>

    <radialGradient id="gAllowLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(105 245) rotate(20) scale(170 150)">
      <stop offset="0"    stop-color="#ffffff" stop-opacity="0.82"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0.34"/>
      <stop offset="1"    stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <mask id="maskLeftSpot" maskUnits="userSpaceOnUse">
      <rect x="0" y="0" width="400" height="400" fill="#000000"/>
      <rect x="0" y="0" width="400" height="400" fill="url(#gAllowLeft)"/>
    </mask>

    <radialGradient id="gAllowTopRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(305 120) rotate(-28) scale(165 140)">
      <stop offset="0"    stop-color="#ffffff" stop-opacity="0.80"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0.32"/>
      <stop offset="1"    stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <mask id="maskTopRightSpot" maskUnits="userSpaceOnUse">
      <rect x="0" y="0" width="400" height="400" fill="#000000"/>
      <rect x="0" y="0" width="400" height="400" fill="url(#gAllowTopRight)"/>
    </mask>

    <radialGradient id="gAllowBR2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(330 315) rotate(-35) scale(175 150)">
      <stop offset="0"    stop-color="#ffffff" stop-opacity="0.80"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="1"    stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <mask id="maskBR2Spot" maskUnits="userSpaceOnUse">
      <rect x="0" y="0" width="400" height="400" fill="#000000"/>
      <rect x="0" y="0" width="400" height="400" fill="url(#gAllowBR2)"/>
    </mask>

    <!-- Grey highlight at ~9–10 (as you had it) -->
    <radialGradient id="gAllowGrey910" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(115 135) rotate(-10) scale(190 155)">
      <stop offset="0"    stop-color="#ffffff" stop-opacity="1.00"/>
      <stop offset="0.50" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="1"    stop-color="#000000" stop-opacity="0.00"/>
    </radialGradient>
    <mask id="maskGrey910" maskUnits="userSpaceOnUse">
      <rect x="0" y="0" width="400" height="400" fill="#000000"/>
      <rect x="0" y="0" width="400" height="400" fill="url(#gAllowGrey910)"/>
    </mask>

    <!-- NEW: 3rd DARK blurred rim stripe (placed ~1–2 o'clock) -->
    <radialGradient id="gAllowDark3" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(315 140) rotate(-18) scale(175 150)">
      <stop offset="0"    stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0.34"/>
      <stop offset="1"    stop-color="#000000" stop-opacity="0.00"/>
    </radialGradient>
    <mask id="maskDark3Spot" maskUnits="userSpaceOnUse">
      <rect x="0" y="0" width="400" height="400" fill="#000000"/>
      <rect x="0" y="0" width="400" height="400" fill="url(#gAllowDark3)"/>
    </mask>

    <filter id="fGlow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="2.6" result="b"/>
      <feMerge><feMergeNode in="b"/></feMerge>
    </filter>

    <filter id="fGlowWide" x="-25%" y="-25%" width="150%" height="150%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="5.2" result="bw"/>
      <feMerge><feMergeNode in="bw"/></feMerge>
    </filter>

    <filter id="fGreySoft" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="6.0" result="gb"/>
      <feMerge><feMergeNode in="gb"/></feMerge>
    </filter>

    <filter id="fNoise" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.35" numOctaves="2" stitchTiles="stitch" seed="9" result="n"/>
      <feColorMatrix in="n" type="matrix"
        values="0 0 0 0 0.55
                0 0 0 0 0.55
                0 0 0 0 0.55
                0 0 0 0.08 0" result="ng"/>
      <feGaussianBlur in="ng" stdDeviation="0.55" result="ngb"/>
      <feMerge><feMergeNode in="ngb"/></feMerge>
    </filter>
  </defs>

  <g clip-path="url(#clipDisk)">
    <circle cx="200" cy="200" r="150" fill="url(#gBaseLight)"/>
    <circle cx="200" cy="200" r="150" fill="url(#gShadeLight)"/>
    <circle cx="200" cy="200" r="150" fill="url(#gHiLight)"/>
    <rect x="40" y="40" width="320" height="320" filter="url(#fNoise)" opacity="0.55"/>

    <!-- Existing rim effects -->
    <g mask="url(#maskBottom)">
      <circle cx="200" cy="200" r="146" fill="none"
              stroke="url(#gRimDark)" stroke-width="12"
              filter="url(#fGlow)" opacity="0.78"/>
    </g>

    <g mask="url(#maskLower)" opacity="0.74">
      <circle cx="200" cy="200" r="145" fill="none"
              stroke="url(#gRimDark)" stroke-width="22"
              filter="url(#fGlowWide)" opacity="0.50"/>
    </g>

    <g mask="url(#maskRightSpot)">
      <circle cx="200" cy="200" r="146" fill="none"
              stroke="url(#gRimDarkBR)" stroke-width="22"
              opacity="0.18" filter="url(#fGlowWide)"/>
      <circle cx="200" cy="200" r="146" fill="none"
              stroke="url(#gRimDarkBR)" stroke-width="14"
              opacity="0.26" filter="url(#fGlow)"/>
    </g>

    <g mask="url(#maskExtraSpot)">
      <circle cx="200" cy="200" r="146" fill="none"
              stroke="url(#gRimDarkDeep)" stroke-width="22"
              opacity="0.22" filter="url(#fGlowWide)"/>
      <circle cx="200" cy="200" r="146" fill="none"
              stroke="url(#gRimDarkDeep)" stroke-width="14"
              opacity="0.30" filter="url(#fGlow)"/>
    </g>

    <g mask="url(#maskExtraLow)">
      <circle cx="200" cy="200" r="146" fill="none"
              stroke="#000000" stroke-opacity="0.16" stroke-width="26"
              filter="url(#fGlowWide)"/>
      <circle cx="200" cy="200" r="146" fill="none"
              stroke="#000000" stroke-opacity="0.22" stroke-width="14"
              filter="url(#fGlow)"/>
    </g>

    <g mask="url(#maskLeftSpot)">
      <circle cx="200" cy="200" r="146" fill="none"
              stroke="url(#gRimDarkDeep)" stroke-width="22"
              opacity="0.18" filter="url(#fGlowWide)"/>
      <circle cx="200" cy="200" r="146" fill="none"
              stroke="url(#gRimDarkDeep)" stroke-width="14"
              opacity="0.26" filter="url(#fGlow)"/>
    </g>

    <g mask="url(#maskTopRightSpot)">
      <circle cx="200" cy="200" r="146" fill="none"
              stroke="url(#gRimDarkDeep)" stroke-width="22"
              opacity="0.16" filter="url(#fGlowWide)"/>
      <circle cx="200" cy="200" r="146" fill="none"
              stroke="url(#gRimDarkDeep)" stroke-width="14"
              opacity="0.22" filter="url(#fGlow)"/>
    </g>

    <g mask="url(#maskBR2Spot)">
      <circle cx="200" cy="200" r="146" fill="none"
              stroke="url(#gRimDarkDeep)" stroke-width="22"
              opacity="0.14" filter="url(#fGlowWide)"/>
      <circle cx="200" cy="200" r="146" fill="none"
              stroke="url(#gRimDarkDeep)" stroke-width="14"
              opacity="0.20" filter="url(#fGlow)"/>
    </g>

    <!-- NEW: 3rd DARK blurred rim stripe (~1–2 o'clock) -->
    <g mask="url(#maskDark3Spot)">
      <circle cx="200" cy="200" r="146" fill="none"
              stroke="#000000" stroke-opacity="0.14" stroke-width="26"
              filter="url(#fGlowWide)"/>
      <circle cx="200" cy="200" r="146" fill="none"
              stroke="#000000" stroke-opacity="0.20" stroke-width="14"
              filter="url(#fGlow)"/>
    </g>

    <!-- GREY rim patch at ~9–10 -->
    <g mask="url(#maskGrey910)">
      <circle cx="200" cy="200" r="146" fill="none"
              stroke="#b8b8b8" stroke-opacity="0.22" stroke-width="22"
              filter="url(#fGreySoft)"/>
      <circle cx="200" cy="200" r="146" fill="none"
              stroke="#c6c6c6" stroke-opacity="0.18" stroke-width="12"
              filter="url(#fGlowWide)"/>
    </g>
  </g>
</svg>
