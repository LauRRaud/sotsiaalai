<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="420" height="420" viewBox="0 0 400 400" fill="none" shape-rendering="auto">
  <defs>
    <radialGradient id="gBase" cx="48%" cy="34%" r="78%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="68%"  stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5F5F5"/>
    </radialGradient>

    <radialGradient id="gShade" cx="50%" cy="22%" r="85%">
      <stop offset="0%"   stop-color="#000000" stop-opacity="0.0"/>
      <stop offset="70%"  stop-color="#000000" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.18"/>
    </radialGradient>

    <radialGradient id="gRimStroke" cx="72%" cy="70%" r="78%">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="72%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="92%" stop-color="#e9e9e9" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f2f2f2" stop-opacity="0.52"/>
    </radialGradient>

    <radialGradient id="gRimStrokeBR" cx="28%" cy="30%" r="78%">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="72%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="92%" stop-color="#f0f0f0" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.34"/>
    </radialGradient>

    <clipPath id="clipSphere">
      <circle cx="200" cy="200" r="188"/>
    </clipPath>

    <linearGradient id="gMaskBottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#000000"/>
      <stop offset="40%"  stop-color="#000000"/>
      <stop offset="70%"  stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>

    <radialGradient id="gAllowTopLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(118.6 122.3) rotate(0) scale(169 132)">
      <stop offset="0"    stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="1"    stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="gAllowTopRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(281.5 109.8) rotate(0) scale(169 132)">
      <stop offset="0"    stop-color="#ffffff" stop-opacity="0.80"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0.40"/>
      <stop offset="1"    stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <mask id="maskBottom" maskUnits="userSpaceOnUse">
      <rect x="0" y="0" width="400" height="400" fill="url(#gMaskBottom)"/>
      <rect x="0" y="0" width="400" height="400" fill="url(#gAllowTopLeft)"/>
    </mask>

    <mask id="maskTopLeftOnly" maskUnits="userSpaceOnUse">
      <rect x="0" y="0" width="400" height="400" fill="#000000"/>
      <rect x="0" y="0" width="400" height="400" fill="url(#gAllowTopLeft)"/>
    </mask>

    <mask id="maskTopRightOnly" maskUnits="userSpaceOnUse">
      <rect x="0" y="0" width="400" height="400" fill="#000000"/>
      <rect x="0" y="0" width="400" height="400" fill="url(#gAllowTopRight)"/>
    </mask>

    <linearGradient id="gMaskLower" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#000000"/>
      <stop offset="58%"  stop-color="#000000"/>
      <stop offset="78%"  stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <mask id="maskLower" maskUnits="userSpaceOnUse">
      <rect x="0" y="0" width="400" height="400" fill="url(#gMaskLower)"/>
    </mask>

    <radialGradient id="gAllowRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(331.6 268.9) rotate(-10) scale(169 150.4)">
      <stop offset="0"    stop-color="#ffffff" stop-opacity="0.70"/>
      <stop offset="0.50" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="1"    stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <mask id="maskRightSpot" maskUnits="userSpaceOnUse">
      <rect x="0" y="0" width="400" height="400" fill="#000000"/>
      <rect x="0" y="0" width="400" height="400" fill="url(#gAllowRight)"/>
    </mask>

    <filter id="fGlow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="2.6" result="b"/>
      <feMerge><feMergeNode in="b"/></feMerge>
    </filter>

    <filter id="fGlowWide" x="-25%" y="-25%" width="150%" height="150%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="5.2" result="bw"/>
      <feMerge><feMergeNode in="bw"/></feMerge>
    </filter>

    <filter id="fCrispSoft" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="1.15" result="cb"/>
      <feMerge><feMergeNode in="cb"/></feMerge>
    </filter>

    <filter id="fNoise" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.35" numOctaves="2" stitchTiles="stitch" seed="7" result="n"/>
      <feColorMatrix in="n" type="matrix"
        values="0 0 0 0 0.55
                0 0 0 0 0.55
                0 0 0 0 0.55
                0 0 0 0.12 0" result="ng"/>
      <feGaussianBlur in="ng" stdDeviation="0.55" result="ngb"/>
      <feComposite in="ngb" in2="SourceGraphic" operator="in" result="nout"/>
      <feMerge><feMergeNode in="nout"/></feMerge>
    </filter>

    <radialGradient id="gSpec" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(177.4 149.9) rotate(0) scale(150.4 106.5)">
      <stop offset="0"    stop-color="#ffffff" stop-opacity="0.50"/>
      <stop offset="0.36" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="1"    stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <g clip-path="url(#clipSphere)">
    <circle cx="200" cy="200" r="188" fill="url(#gBase)"/>
    <circle cx="200" cy="200" r="188" fill="url(#gShade)"/>
    <circle cx="200" cy="200" r="188" fill="url(#gSpec)"/>
    <rect x="12" y="12" width="376" height="376" filter="url(#fNoise)" opacity="0.06"/>

    <g mask="url(#maskBottom)">
      <circle cx="200" cy="200" r="184" fill="none"
              stroke="url(#gRimStroke)" stroke-width="12" filter="url(#fGlow)"/>
    </g>

    <g mask="url(#maskLower)" opacity="0.4">
      <circle cx="200" cy="200" r="183" fill="none"
              stroke="url(#gRimStroke)" stroke-width="22" filter="url(#fGlowWide)" opacity="0.55"/>
    </g>

    <g mask="url(#maskRightSpot)">
      <circle cx="200" cy="200" r="184" fill="none"
              stroke="url(#gRimStrokeBR)" stroke-width="22"
              opacity="0.24" filter="url(#fGlowWide)"/>
      <circle cx="200" cy="200" r="184" fill="none"
              stroke="url(#gRimStrokeBR)" stroke-width="14"
              opacity="0.34" filter="url(#fGlow)"/>
    </g>

    <g mask="url(#maskLower)">
      <circle cx="200" cy="200" r="184" fill="none"
              stroke="#000000" stroke-opacity="0.1" stroke-width="18"
              filter="url(#fGlowWide)"/>
    </g>

    <g mask="url(#maskRightSpot)">
      <circle cx="200" cy="200" r="184" fill="none"
              stroke="#000000" stroke-opacity="0.3" stroke-width="16"
              filter="url(#fGlowWide)"/>
    </g>

    <g mask="url(#maskTopLeftOnly)">
      <circle cx="200" cy="200" r="184" fill="none"
              stroke="#000000" stroke-opacity="0.2" stroke-width="14"
              filter="url(#fGlowWide)"/>
    </g>

    <g mask="url(#maskTopRightOnly)">
      <circle cx="200" cy="200" r="184" fill="none"
              stroke="#000000" stroke-opacity="0.3" stroke-width="14"
              filter="url(#fGlowWide)"/>
    </g>
  </g>
</svg>
