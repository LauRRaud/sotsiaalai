<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="420" height="420" viewBox="0 0 400 400" fill="none" shape-rendering="auto">
  <defs>
    <radialGradient id="gBase" cx="36%" cy="24%" r="92%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="48%" stop-color="#fcfbf7"/>
      <stop offset="100%" stop-color="#f3f0e8"/>
    </radialGradient>

    <radialGradient id="gLightSweep" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(162 150) rotate(-12) scale(206 148)">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.58"/>
      <stop offset="0.52" stop-color="#fffdf7" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#fff7eb" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="gHotspot" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(132 128) rotate(0) scale(74 54)">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.72"/>
      <stop offset="0.46" stop-color="#ffffff" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="gMidForm" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(214 198) rotate(-8) scale(186 132)">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="gRightLift" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(286 142) rotate(-12) scale(118 92)">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.42"/>
      <stop offset="0.5" stop-color="#f4f8ff" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="gTopRightHot" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(290 126) rotate(-16) scale(66 46)">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.62"/>
      <stop offset="0.48" stop-color="#ffffff" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="gBottomFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="62%" stop-color="#000000" stop-opacity="0.02"/>
      <stop offset="84%" stop-color="#000000" stop-opacity="0.075"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.125"/>
    </linearGradient>

    <radialGradient id="gBottomCore" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(228 286) rotate(-8) scale(198 132)">
      <stop offset="0" stop-color="#000000" stop-opacity="0.09"/>
      <stop offset="0.56" stop-color="#000000" stop-opacity="0.032"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="gBottomLift" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(204 322) rotate(0) scale(164 46)">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="0.58" stop-color="#fffdf8" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="gEdgeSoft" gradientUnits="userSpaceOnUse" cx="200" cy="200" r="188">
      <stop offset="0.83" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.08"/>
    </radialGradient>

    <clipPath id="clipSphere">
      <circle cx="200" cy="200" r="188"/>
    </clipPath>

    <radialGradient id="gMaskTopLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(122 118) rotate(-7) scale(186 146)">
      <stop offset="0" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="0.58" stop-color="#ffffff" stop-opacity="0.78"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <mask id="maskTopLeft" maskUnits="userSpaceOnUse">
      <rect x="0" y="0" width="400" height="400" fill="#000000"/>
      <rect x="0" y="0" width="400" height="400" fill="url(#gMaskTopLeft)"/>
    </mask>

    <radialGradient id="gMaskTopBand" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(206 108) rotate(0) scale(188 94)">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.96"/>
      <stop offset="0.58" stop-color="#ffffff" stop-opacity="0.40"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <mask id="maskTopBand" maskUnits="userSpaceOnUse">
      <rect x="0" y="0" width="400" height="400" fill="#000000"/>
      <rect x="0" y="0" width="400" height="400" fill="url(#gMaskTopBand)"/>
    </mask>

    <radialGradient id="gMaskTopRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(292 126) rotate(-14) scale(138 104)">
      <stop offset="0" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="0.56" stop-color="#ffffff" stop-opacity="0.64"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <mask id="maskTopRight" maskUnits="userSpaceOnUse">
      <rect x="0" y="0" width="400" height="400" fill="#000000"/>
      <rect x="0" y="0" width="400" height="400" fill="url(#gMaskTopRight)"/>
    </mask>


    <linearGradient id="gMaskBottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="58%" stop-color="#000000"/>
      <stop offset="80%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <mask id="maskBottom" maskUnits="userSpaceOnUse">
      <rect x="0" y="0" width="400" height="400" fill="url(#gMaskBottom)"/>
    </mask>

    <radialGradient id="gMaskBottomRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(320 286) rotate(-14) scale(194 152)">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.90"/>
      <stop offset="0.54" stop-color="#ffffff" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <mask id="maskBottomRight" maskUnits="userSpaceOnUse">
      <rect x="0" y="0" width="400" height="400" fill="#000000"/>
      <rect x="0" y="0" width="400" height="400" fill="url(#gMaskBottomRight)"/>
    </mask>

    <filter id="fGlow" filterUnits="userSpaceOnUse" x="-120" y="-120" width="640" height="640" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="2.8" result="b"/>
      <feMerge><feMergeNode in="b"/></feMerge>
    </filter>

    <filter id="fWide" filterUnits="userSpaceOnUse" x="-140" y="-140" width="680" height="680" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="5.2" result="bw"/>
      <feMerge><feMergeNode in="bw"/></feMerge>
    </filter>

    <filter id="fSoft" filterUnits="userSpaceOnUse" x="-120" y="-120" width="640" height="640" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="1.25" result="sb"/>
      <feMerge><feMergeNode in="sb"/></feMerge>
    </filter>

    <filter id="fNoise" filterUnits="userSpaceOnUse" x="-140" y="-140" width="680" height="680" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.30" numOctaves="2" stitchTiles="noStitch" seed="11" result="n"/>
      <feColorMatrix in="n" type="matrix"
        values="0 0 0 0 0.58
                0 0 0 0 0.56
                0 0 0 0 0.51
                0 0 0 0.04 0" result="ng"/>
      <feGaussianBlur in="ng" stdDeviation="0.55" result="ngb"/>
      <feComposite in="ngb" in2="SourceGraphic" operator="in" result="nout"/>
      <feMerge><feMergeNode in="nout"/></feMerge>
    </filter>
  </defs>

  <g clip-path="url(#clipSphere)">
    <circle cx="200" cy="200" r="188" fill="url(#gBase)"/>
    <circle cx="200" cy="200" r="188" fill="url(#gLightSweep)"/>
    <circle cx="200" cy="200" r="188" fill="url(#gHotspot)"/>
    <circle cx="200" cy="200" r="188" fill="url(#gMidForm)"/>
    <circle cx="200" cy="200" r="188" fill="url(#gRightLift)"/>
    <circle cx="200" cy="200" r="188" fill="url(#gTopRightHot)"/>
    <circle cx="200" cy="200" r="188" fill="url(#gBottomFade)"/>
    <circle cx="200" cy="200" r="188" fill="url(#gBottomCore)"/>
    <circle cx="200" cy="200" r="188" fill="url(#gBottomLift)"/>
    <circle cx="200" cy="200" r="188" fill="url(#gEdgeSoft)"/>

    <g>
      <circle cx="200" cy="200" r="188" fill="#000000" filter="url(#fNoise)" opacity="0.024"/>

      <!-- Strong top-left rim highlight -->
      <g mask="url(#maskTopLeft)">
        <circle cx="200" cy="200" r="184" fill="none"
                stroke="#ffffff" stroke-opacity="0.92" stroke-width="16"
                filter="url(#fGlow)"/>
        <circle cx="200" cy="200" r="184" fill="none"
                stroke="#ffffff" stroke-opacity="0.58" stroke-width="7"
                filter="url(#fSoft)"/>
      </g>

      <!-- Broad top gloss band -->
      <g mask="url(#maskTopBand)">
        <circle cx="200" cy="200" r="184" fill="none"
                stroke="#ffffff" stroke-opacity="0.22" stroke-width="10"
                filter="url(#fSoft)"/>
      </g>

      <!-- Upper-right rim response to balance lighting -->
      <g mask="url(#maskTopRight)">
        <circle cx="200" cy="200" r="184" fill="none"
                stroke="#ffffff" stroke-opacity="0.66" stroke-width="13"
                filter="url(#fGlow)"/>
        <circle cx="200" cy="200" r="184" fill="none"
                stroke="#f4f8ff" stroke-opacity="0.42" stroke-width="6.4"
                filter="url(#fGlow)"/>
      </g>

      <!-- Pronounced lower hemisphere depth -->
      <g mask="url(#maskBottom)">
        <circle cx="200" cy="200" r="184" fill="none"
                stroke="#000000" stroke-opacity="0.1" stroke-width="14"
                filter="url(#fWide)"/>
      </g>

      <!-- Extra lower-right mass -->
      <g mask="url(#maskBottomRight)">
        <circle cx="200" cy="200" r="184" fill="none"
                stroke="#000000" stroke-opacity="0.1" stroke-width="13"
                filter="url(#fWide)"/>
        <circle cx="200" cy="200" r="184" fill="none"
                stroke="#000000" stroke-opacity="0.05" stroke-width="5.5"
                filter="url(#fGlow)"/>
      </g>

      <g mask="url(#maskBottom)">
        <circle cx="200" cy="200" r="184" fill="none"
                stroke="#ffffff" stroke-opacity="0.08" stroke-width="5.1"
                filter="url(#fSoft)"/>
      </g>
    </g>
  </g>
</svg>
