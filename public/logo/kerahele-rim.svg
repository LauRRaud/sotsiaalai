      <stop offset="66%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="76%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="84%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="90%" stop-color="#ffffff" stop-opacity="0.30"/>
