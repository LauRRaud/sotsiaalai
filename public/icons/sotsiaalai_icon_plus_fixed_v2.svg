<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Network icon with plus">
  <title>Network icon with plus</title>
  <desc>Clean network-style icon with five diamond nodes and a central plus inside a circle.</desc>

  <rect width="1024" height="1024" fill="#efefef"/>

  <g stroke="#000000" stroke-width="44" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M 512 580 L 512 215" /><path d="M 457 600 L 386 520 L 386 408" /><path d="M 567 600 L 638 520 L 638 408" /><path d="M 372 720 L 182 720 L 182 634" /><path d="M 652 720 L 842 720 L 842 634" />
  </g>

  <!-- Central circle -->
  <circle cx="512" cy="720" r="140" fill="#efefef" stroke="#000000" stroke-width="44" />

  <!-- Plus sign -->
  <g stroke="#000000" stroke-width="34" stroke-linecap="round">
    <path d="M 512 668 L 512 772" />
    <path d="M 460 720 L 564 720" />
  </g>

  <!-- Node diamonds drawn after lines so no internal overlaps show -->
  <g fill="#efefef" stroke="#000000" stroke-width="44" stroke-linejoin="round">
    <rect x="453.0" y="101.0" width="118.0" height="118.0" rx="8" ry="8" transform="rotate(45 512.0 160.0)" />
    <rect x="273.0" y="281.0" width="118.0" height="118.0" rx="8" ry="8" transform="rotate(45 332.0 340.0)" />
    <rect x="633.0" y="281.0" width="118.0" height="118.0" rx="8" ry="8" transform="rotate(45 692.0 340.0)" />
    <rect x="123.0" y="501.0" width="118.0" height="118.0" rx="8" ry="8" transform="rotate(45 182.0 560.0)" />
    <rect x="783.0" y="501.0" width="118.0" height="118.0" rx="8" ry="8" transform="rotate(45 842.0 560.0)" />
  </g>
</svg>
