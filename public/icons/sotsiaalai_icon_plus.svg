<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Network icon with plus">
  <title>Network icon with plus</title>
  <desc>Clean black SVG icon with five diamond nodes connected to a central circle containing a plus sign.</desc>
  <g stroke="#000000" stroke-width="44" stroke-linecap="round" stroke-linejoin="round">
    <!-- Branches -->
    <path d="M512 580 L512 285" />
    <path d="M452 612 L318 478 L318 410" />
    <path d="M572 612 L706 478 L706 410" />
    <path d="M373 760 L208 720 L208 635" />
    <path d="M651 760 L816 720 L816 635" />

    <!-- Diamond nodes -->
    <rect x="426" y="103" width="172" height="172" rx="8" transform="rotate(45 512 189)" />
    <rect x="232" y="288" width="172" height="172" rx="8" transform="rotate(45 318 374)" />
    <rect x="620" y="288" width="172" height="172" rx="8" transform="rotate(45 706 374)" />
    <rect x="122" y="474" width="172" height="172" rx="8" transform="rotate(45 208 560)" />
    <rect x="730" y="474" width="172" height="172" rx="8" transform="rotate(45 816 560)" />
  </g>

  <!-- Central hub -->
  <circle cx="512" cy="720" r="140" fill="#FFFFFF" stroke="#000000" stroke-width="44" />

  <!-- Plus sign -->
  <g stroke="#000000" stroke-width="34" stroke-linecap="round">
    <path d="M512 670 V770" />
    <path d="M462 720 H562" />
  </g>
</svg>
