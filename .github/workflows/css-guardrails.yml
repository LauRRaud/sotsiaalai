name: CSS Guardrails

on:
  pull_request:
    branches:
      - main

jobs:
  css-guardrails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Legacy CSS guard
        run: npm run css:guard
