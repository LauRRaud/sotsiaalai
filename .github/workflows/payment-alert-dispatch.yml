name: Payment Alert Dispatch

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run in dry-run mode (no outbound webhook dispatch)"
        required: false
        default: true
        type: boolean
      bypass_dedupe:
        description: "Bypass dedupe window for this run"
        required: false
        default: false
        type: boolean
      locale:
        description: "Locale sent to dispatch endpoint"
        required: false
        default: "en"
        type: choice
        options:
          - en
          - et
          - ru

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          PAYMENT_ALERT_DISPATCH_BASE_URL: ${{ secrets.PAYMENT_ALERT_DISPATCH_BASE_URL }}
          PAYMENT_ALERT_DISPATCH_KEY: ${{ secrets.PAYMENT_ALERT_DISPATCH_KEY }}
        run: |
          if [ -z "${PAYMENT_ALERT_DISPATCH_BASE_URL}" ]; then
            echo "Missing repository secret: PAYMENT_ALERT_DISPATCH_BASE_URL"
            exit 1
          fi
          if [ -z "${PAYMENT_ALERT_DISPATCH_KEY}" ]; then
            echo "Missing repository secret: PAYMENT_ALERT_DISPATCH_KEY"
            exit 1
          fi

      - name: Dispatch alerts (scheduled)
        if: github.event_name == 'schedule'
        env:
          PAYMENT_ALERT_DISPATCH_BASE_URL: ${{ secrets.PAYMENT_ALERT_DISPATCH_BASE_URL }}
          PAYMENT_ALERT_DISPATCH_KEY: ${{ secrets.PAYMENT_ALERT_DISPATCH_KEY }}
          PAYMENT_ALERT_DISPATCH_DRY_RUN: "0"
          PAYMENT_ALERT_DISPATCH_BYPASS_DEDUPE: "0"
          PAYMENT_ALERT_DISPATCH_LOCALE: "en"
        run: node scripts/payment-alert-dispatch.mjs

      - name: Dispatch alerts (manual)
        if: github.event_name == 'workflow_dispatch'
        env:
          PAYMENT_ALERT_DISPATCH_BASE_URL: ${{ secrets.PAYMENT_ALERT_DISPATCH_BASE_URL }}
          PAYMENT_ALERT_DISPATCH_KEY: ${{ secrets.PAYMENT_ALERT_DISPATCH_KEY }}
          PAYMENT_ALERT_DISPATCH_DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
          PAYMENT_ALERT_DISPATCH_BYPASS_DEDUPE: ${{ inputs.bypass_dedupe && '1' || '0' }}
          PAYMENT_ALERT_DISPATCH_LOCALE: ${{ inputs.locale }}
        run: node scripts/payment-alert-dispatch.mjs
